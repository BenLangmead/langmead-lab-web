<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Trie / suffix tree: root at top, branching down 3 levels -->
  <!-- Edges -->
  <!-- Root to level-1 left -->
  <line x1="32" y1="10" x2="14" y2="28" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Root to level-1 right -->
  <line x1="32" y1="10" x2="50" y2="28" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left node to level-2 children -->
  <line x1="14" y1="28" x2="7"  y2="46" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="28" x2="21" y2="46" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <!-- Right node to level-2 children -->
  <line x1="50" y1="28" x2="43" y2="46" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="28" x2="57" y2="46" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <!-- Nodes -->
  <!-- Root -->
  <circle cx="32" cy="10" r="7" fill="#2780e3"/>
  <!-- Level 1 -->
  <circle cx="14" cy="28" r="6" fill="#3b82f6"/>
  <circle cx="50" cy="28" r="6" fill="#3b82f6"/>
  <!-- Level 2 leaves -->
  <circle cx="7"  cy="46" r="5" fill="#93c5fd"/>
  <circle cx="21" cy="46" r="5" fill="#93c5fd"/>
  <circle cx="43" cy="46" r="5" fill="#93c5fd"/>
  <circle cx="57" cy="46" r="5" fill="#93c5fd"/>
  <!-- Small leaf indicators -->
  <line x1="7"  y1="51" x2="7"  y2="58" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="51" x2="21" y2="58" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <line x1="43" y1="51" x2="43" y2="58" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <line x1="57" y1="51" x2="57" y2="58" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
</svg>
