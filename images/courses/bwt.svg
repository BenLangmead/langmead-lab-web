<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- FM-index / tally table: 5 sorted rows, L col highlighted blue, F col highlighted red -->
  <!-- Row backgrounds -->
  <rect x="4"  y="4"  width="56" height="11" rx="2" fill="#f8fafc"/>
  <rect x="4"  y="17" width="56" height="11" rx="2" fill="#f8fafc"/>
  <rect x="4"  y="30" width="56" height="11" rx="2" fill="#f8fafc"/>
  <rect x="4"  y="43" width="56" height="11" rx="2" fill="#f8fafc"/>
  <rect x="4"  y="56" width="56" height="11" rx="2" fill="#f8fafc"/>
  <!-- L column (last chars of BWT) — left side, blue -->
  <rect x="4"  y="4"  width="13" height="11" rx="2" fill="#bfdbfe"/>
  <rect x="4"  y="17" width="13" height="11" rx="2" fill="#bfdbfe"/>
  <rect x="4"  y="30" width="13" height="11" rx="2" fill="#bfdbfe"/>
  <rect x="4"  y="43" width="13" height="11" rx="2" fill="#bfdbfe"/>
  <rect x="4"  y="56" width="13" height="11" rx="2" fill="#bfdbfe"/>
  <!-- L column letters -->
  <text x="10" y="13"  font-family="monospace" font-size="9" fill="#1d4ed8" text-anchor="middle">A</text>
  <text x="10" y="26"  font-family="monospace" font-size="9" fill="#1d4ed8" text-anchor="middle">T</text>
  <text x="10" y="39"  font-family="monospace" font-size="9" fill="#1d4ed8" text-anchor="middle">A</text>
  <text x="10" y="52"  font-family="monospace" font-size="9" fill="#1d4ed8" text-anchor="middle">C</text>
  <text x="10" y="65"  font-family="monospace" font-size="9" fill="#1d4ed8" text-anchor="middle">G</text>
  <!-- Middle dots representing sorted suffixes -->
  <text x="32" y="13"  font-family="monospace" font-size="8" fill="#9ca3af" text-anchor="middle">···</text>
  <text x="32" y="26"  font-family="monospace" font-size="8" fill="#9ca3af" text-anchor="middle">···</text>
  <text x="32" y="39"  font-family="monospace" font-size="8" fill="#9ca3af" text-anchor="middle">···</text>
  <text x="32" y="52"  font-family="monospace" font-size="8" fill="#9ca3af" text-anchor="middle">···</text>
  <text x="32" y="65"  font-family="monospace" font-size="8" fill="#9ca3af" text-anchor="middle">···</text>
  <!-- F column (first chars, sorted) — right side, red -->
  <rect x="47" y="4"  width="13" height="11" rx="2" fill="#fecaca"/>
  <rect x="47" y="17" width="13" height="11" rx="2" fill="#fecaca"/>
  <rect x="47" y="30" width="13" height="11" rx="2" fill="#fecaca"/>
  <rect x="47" y="43" width="13" height="11" rx="2" fill="#fecaca"/>
  <rect x="47" y="56" width="13" height="11" rx="2" fill="#fecaca"/>
  <!-- F column letters -->
  <text x="53" y="13"  font-family="monospace" font-size="9" fill="#991b1b" text-anchor="middle">A</text>
  <text x="53" y="26"  font-family="monospace" font-size="9" fill="#991b1b" text-anchor="middle">A</text>
  <text x="53" y="39"  font-family="monospace" font-size="9" fill="#991b1b" text-anchor="middle">C</text>
  <text x="53" y="52"  font-family="monospace" font-size="9" fill="#991b1b" text-anchor="middle">G</text>
  <text x="53" y="65"  font-family="monospace" font-size="9" fill="#991b1b" text-anchor="middle">T</text>
</svg>
