<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Abstract HMM: hidden state chain (top row) + observation layer (bottom row), no text -->

  <!-- Transition arrows between hidden states -->
  <defs>
    <marker id="ha" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#3b82f6"/>
    </marker>
    <marker id="ea" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#93c5fd"/>
    </marker>
  </defs>

  <!-- S0 → S1 transition arc -->
  <path d="M21,18 Q32,10 43,18" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ha)"/>
  <!-- S1 → S0 return arc (below) -->
  <path d="M43,24 Q32,32 21,24" stroke="#60a5fa" stroke-width="1.5" fill="none" marker-end="url(#ha)"/>
  <!-- S0 self-loop -->
  <path d="M12,16 Q6,8 14,11" stroke="#93c5fd" stroke-width="1.3" fill="none" marker-end="url(#ha)"/>
  <!-- S1 self-loop -->
  <path d="M52,16 Q58,8 50,11" stroke="#93c5fd" stroke-width="1.3" fill="none" marker-end="url(#ha)"/>

  <!-- Hidden state nodes -->
  <circle cx="14" cy="21" r="9" fill="#2780e3" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="50" cy="21" r="9" fill="#2780e3" stroke="#1d4ed8" stroke-width="1.5"/>

  <!-- Emission arrows (hidden → observed) -->
  <line x1="14" y1="30" x2="14" y2="42" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#ea)"/>
  <line x1="50" y1="30" x2="50" y2="42" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#ea)"/>

  <!-- Observation nodes (diamonds = observed/emitted symbols) -->
  <!-- Diamond at (14, 50) -->
  <polygon points="14,43 21,50 14,57 7,50" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Diamond at (50, 50) -->
  <polygon points="50,43 57,50 50,57 43,50" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- DNA base dots inside observation diamonds (abstract, no letters) -->
  <circle cx="11" cy="50" r="1.5" fill="#3b82f6" opacity="0.6"/>
  <circle cx="14" cy="50" r="1.5" fill="#dc2626" opacity="0.6"/>
  <circle cx="17" cy="50" r="1.5" fill="#16a34a" opacity="0.6"/>

  <circle cx="47" cy="50" r="1.5" fill="#dc2626" opacity="0.6"/>
  <circle cx="50" cy="50" r="1.5" fill="#16a34a" opacity="0.6"/>
  <circle cx="53" cy="50" r="1.5" fill="#3b82f6" opacity="0.6"/>
</svg>
