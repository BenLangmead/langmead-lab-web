<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- HMM state diagram: 3 states with transition arrows -->
  <!-- Edges (drawn behind nodes) -->
  <!-- S0 → S1 -->
  <path d="M 18 26 Q 32 16 46 26" stroke="#93c5fd" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <!-- S1 → S0 (return arc) -->
  <path d="M 46 30 Q 32 40 18 30" stroke="#93c5fd" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <!-- S1 → S2 -->
  <path d="M 54 32 Q 60 44 54 52" stroke="#bfdbfe" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <!-- S0 self-loop -->
  <path d="M 12 20 Q 4 10 14 14" stroke="#bfdbfe" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#93c5fd"/>
    </marker>
  </defs>
  <!-- State nodes -->
  <!-- S0 (hidden state) -->
  <circle cx="14" cy="28" r="11" fill="#2780e3"/>
  <text x="14" y="32" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">S₀</text>
  <!-- S1 (hidden state) -->
  <circle cx="50" cy="28" r="11" fill="#2780e3"/>
  <text x="50" y="32" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">S₁</text>
  <!-- Emission nodes (observed) -->
  <rect x="6"  y="48" width="16" height="12" rx="3" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="14" y="58" font-family="monospace" font-size="8" fill="#1d4ed8" text-anchor="middle">A·C</text>
  <rect x="42" y="48" width="16" height="12" rx="3" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="50" y="58" font-family="monospace" font-size="8" fill="#1d4ed8" text-anchor="middle">G·T</text>
  <!-- Emission arrows -->
  <line x1="14" y1="39" x2="14" y2="47" stroke="#bfdbfe" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="50" y1="39" x2="50" y2="47" stroke="#bfdbfe" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
