<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Jaccard similarity: two overlapping circles (Venn diagram) -->
  <!-- Left circle -->
  <circle cx="24" cy="32" r="20" fill="#bfdbfe" fill-opacity="0.7" stroke="#2780e3" stroke-width="2.5"/>
  <!-- Right circle -->
  <circle cx="40" cy="32" r="20" fill="#fca5a5" fill-opacity="0.7" stroke="#dc2626" stroke-width="2.5"/>
  <!-- Overlap highlight (darker tint to show intersection) -->
  <!-- Clipping path approach: the overlap region gets a slightly darker tint naturally from the two semi-transparent fills -->
  <!-- Small dots inside each region suggesting set elements -->
  <circle cx="16" cy="26" r="2" fill="#1d4ed8" opacity="0.5"/>
  <circle cx="14" cy="36" r="2" fill="#1d4ed8" opacity="0.5"/>
  <circle cx="20" cy="42" r="2" fill="#1d4ed8" opacity="0.5"/>
  <circle cx="44" cy="24" r="2" fill="#991b1b" opacity="0.5"/>
  <circle cx="48" cy="34" r="2" fill="#991b1b" opacity="0.5"/>
  <circle cx="46" cy="44" r="2" fill="#991b1b" opacity="0.5"/>
  <!-- Shared element in intersection -->
  <circle cx="32" cy="32" r="2.5" fill="#7c3aed" opacity="0.7"/>
</svg>
